[PIPELINE]
# Set to true/false to enable or disable each step
remove_empty_tracks                 = false	# Remove empty tracks
remove_muted_tracks                 = false	# Remove muted tracks
ungroup_tracks                      = false	# Ungroup all grouped tracks
remove_unused_return_tracks         = false	# Remove unused return tracks
remove_disabled_devices             = false	# Remove disabled insert devices
remove_non_automated_devices        = false	# Remove non-automated insert devices
deduplicate_devices                 = false	# Deduplicate specific devices per track (set in SETTINGS)
convert_mixer_automation_to_utility = false	# Convert Mixer Vol/Pan automation to Utility device
sort_color_tracks                   = false	# Sort & Recolor tracks/clips
duplicate_device_chain              = false	# Duplicate device chains to new tracks
quantize_midi_notes                 = false	# Quantize all MIDI notes to 1/16
transpose_midi_notes                = false	# Transpose all MIDI notes (set in SETTINGS)
set_track_heights                   = false	# Set all track heights to a custom size (set in SETTINGS)
get_project_report                  = false	# Export full project report to txt


[SETTINGS]
dedupe_devices           = ott, saus          	# Device names to deduplicate (comma-separated)
exclude_conversion_types = RTN, MST           	# Exclude Return (RTN) and/or Master (MST) from conversion
duplicate_chain_suffix   = ' [chain]'         	# Suffix appended to duplicated device chain track names
exclude_midi_prefixes    = DRUMS,EFFECTS,DR,FX	# Prefixes to exclude from MIDI quantize/transpose
transpose_semitones      = -12                	# Semitones to shift all MIDI notes (e.g. +2, -3)
lane_height              = 68                 	# Track height (multiple of 17, range 17–425)


[TRACK_PREFIXES]
# ───  Individual: 2-letter | Group: uppercase full word  ────────────
KICKS       = 1, 56     # Kick group — all kick layers
BD          = 2, 56     # Kick

DRUMS       = 3, 57     # Drums group — all percussion
DR          = 4, 57     # Drum

BASS        = 5, 15     # Bass group — all bass layers
SB          = 6, 15     # Sub Bass
MB          = 7, 1      # Mid Bass
TB          = 8, 1      # Top Bass

SYNTHS      = 9, 6      # Synths group — leads, plucks, arps, pads
LD          = 10, 6     # Lead
PL          = 11, 6     # Pluck
AR          = 12, 6     # Arp
PD          = 13, 61    # Pad

INSTRUMENTS = 14, 21    # Instruments group — keys, orchestral (real instruments)
KY          = 15, 21    # Keys — piano, organ, electric piano, rhodes, synth keys
OR          = 16, 23    # Orchestral — orchestral instruments except Keys

EFFECTS     = 17, 0     # FX group — all FX, risers, atmos
FX          = 18, 0     # FX — event-based: impact, hit, sweep, one-shot
RS          = 19, 0     # Riser — tension builder, downlifter
AT          = 20, 54    # Atmos — sustained: noise bed, texture, drone

VOCALS      = 21, 3     # Vocals group — all vocal tracks
VX          = 22, 3     # Vocal

# ───  Special track types (by type, not prefix)  ──────────────────
DEF 	    = 99, 13	# Default — fallback for missing prefixes
RTN 	    = 99, 41	# Return
MST 	    = 99, 69	# Master


# ══════════════════════════════════════════════════════
# ABLETON COLOR PALETTE  (5 x 14 colors)
# ══════════════════════════════════════════════════════
# Col 1       (0, 14, 28, 42, 56)              		->  Red / Pink
# Col 2-3     (1-2, 15-16, 29-30, 43-44, 57-58)		->  Orange / Brown
# Col 4-6     (3-5, 17-19, 31-33, 45-47, 59-61)		->  Green / Yellow
# Col 7-10    (6-9, 20-23, 34-37, 48-51, 62-65)		->  Blue / Cyan
# Col 11-13   (10-12, 24-26, 38-40, 52-54, 66-68)	->  Purple / Pink
# Col 14      (13, 27, 41, 55, 69)			->  White / Black

